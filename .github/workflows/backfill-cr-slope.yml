name: Backfill CR/Slope

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Optioneel: één user_id om te backfillen (leeg = alle gebruikers)'
        required: false
        default: ''
      mode:
        description: 'Modus'
        required: false
        default: 'backfill'
        type: choice
        options:
          - backfill
          - status

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installeer dependencies
        run: pip install -r scripts/requirements.txt

      - name: Backfill CR/slope
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOLF_USER_ID:         ${{ inputs.user_id }}
          LOG_LEVEL:            INFO
        run: python scripts/scrape_cr_slope.py ${{ inputs.mode || 'backfill' }}
